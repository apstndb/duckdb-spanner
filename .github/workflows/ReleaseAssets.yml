# Promote an exact successful main run into a fully staged draft release.
name: Stage Release Assets

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing annotated release tag (for example, v0.4.0)
        required: true
        type: string
      source_run_id:
        description: Successful main distribution workflow run to promote
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: stage-release-assets-${{ inputs.release_tag }}
  cancel-in-progress: false

env:
  DUCKDB_VERSION: v1.5.5
  EXTENSION_NAME: spanner

jobs:
  preflight:
    name: Validate tag, run, draft, and artifact set
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      # Draft releases are visible only to tokens with push access.
      contents: write
    outputs:
      artifact_ids: ${{ steps.validate.outputs.artifact_ids }}
      artifact_ids_csv: ${{ steps.validate.outputs.artifact_ids_csv }}
      artifact_manifest: ${{ steps.validate.outputs.artifact_manifest }}
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      DISPATCH_SHA: ${{ github.sha }}
      RELEASE_TAG: ${{ inputs.release_tag }}
      SOURCE_RUN_ID: ${{ inputs.source_run_id }}
    steps:
      - name: Check out the release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: refs/tags/${{ inputs.release_tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate immutable release inputs
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          source_run=$(gh api "repos/$GH_REPO/actions/runs/$SOURCE_RUN_ID")
          source_sha=$(jq -r '.head_sha' <<<"$source_run")
          source_branch=$(jq -r '.head_branch' <<<"$source_run")
          source_event=$(jq -r '.event' <<<"$source_run")
          source_status=$(jq -r '.status' <<<"$source_run")
          source_conclusion=$(jq -r '.conclusion' <<<"$source_run")
          source_path=$(jq -r '.path' <<<"$source_run")
          tag_sha=$(git rev-parse HEAD)

          if [[ "$source_branch" != main || "$source_event" != push ||
                "$source_status" != completed || "$source_conclusion" != success ||
                "$source_path" != .github/workflows/MainDistributionPipeline.yml ]]; then
            echo "Source run is not a successful main distribution push: $source_run" >&2
            exit 1
          fi
          if [[ "$tag_sha" != "$source_sha" ]]; then
            echo "Release tag $RELEASE_TAG points to $tag_sha, not source run SHA $source_sha." >&2
            exit 1
          fi
          if [[ "$DISPATCH_SHA" != "$tag_sha" ]]; then
            echo "Dispatch ref points to $DISPATCH_SHA, not release tag SHA $tag_sha." >&2
            exit 1
          fi
          if [[ $(git cat-file -t "refs/tags/$RELEASE_TAG") != tag ]]; then
            echo "Release tag $RELEASE_TAG must be an annotated tag." >&2
            exit 1
          fi

          git fetch --no-tags origin '+refs/heads/main:refs/remotes/origin/main'
          if ! git merge-base --is-ancestor "$tag_sha" refs/remotes/origin/main; then
            echo "Release tag $RELEASE_TAG is not reachable from origin/main." >&2
            exit 1
          fi

          draft=$(gh release view "$RELEASE_TAG" --json isDraft --jq '.isDraft')
          if [[ "$draft" != true ]]; then
            echo "Release $RELEASE_TAG must exist and remain draft during staging." >&2
            exit 1
          fi
          asset_count=$(gh release view "$RELEASE_TAG" --json assets --jq '.assets | length')
          if [[ "$asset_count" != 0 ]]; then
            echo "Draft release $RELEASE_TAG already has $asset_count uploaded asset(s)." >&2
            exit 1
          fi

          expected=$(printf '%s\n' \
            spanner-v1.5.5-extension-linux_amd64 \
            spanner-v1.5.5-extension-linux_arm64 \
            spanner-v1.5.5-extension-osx_amd64 \
            spanner-v1.5.5-extension-osx_arm64 \
            spanner-v1.5.5-extension-windows_amd64 \
            spanner-v1.5.5-extension-windows_amd64_mingw | sort)
          artifacts_json=$(gh api \
            "repos/$GH_REPO/actions/runs/$SOURCE_RUN_ID/artifacts?per_page=100")
          active_artifacts=$(jq -c \
            '[.artifacts[] | select(.expired == false)] | sort_by(.name)' \
            <<<"$artifacts_json")
          actual=$(jq -r '.[].name' <<<"$active_artifacts")
          if [[ "$actual" != "$expected" ]]; then
            echo 'Source run artifact set does not match the six distribution platforms.' >&2
            diff -u <(printf '%s\n' "$expected") <(printf '%s\n' "$actual") || true
            exit 1
          fi
          if ! jq -e '
            length == 6 and
            all(.[];
              (.id | type) == "number" and
              (.digest | type) == "string" and
              (.digest | test("^sha256:[0-9a-f]{64}$"))
            )
          ' <<<"$active_artifacts" >/dev/null; then
            echo 'Source artifacts must have six unique IDs and SHA-256 digests.' >&2
            exit 1
          fi

          artifact_ids=$(jq -c '
            map({
              key: (.name | sub("^spanner-v1\\.5\\.5-extension-"; "")),
              value: (.id | tostring)
            }) | from_entries
          ' <<<"$active_artifacts")
          artifact_ids_csv=$(jq -r 'map(.id | tostring) | join(",")' \
            <<<"$active_artifacts")
          artifact_manifest=$(jq -c '[.[] | {id, name, digest}]' \
            <<<"$active_artifacts")
          {
            echo "artifact_ids=$artifact_ids"
            echo "artifact_ids_csv=$artifact_ids_csv"
            echo "artifact_manifest=$artifact_manifest"
          } >> "$GITHUB_OUTPUT"

          scripts/check-release-integrity.sh --release-tag "$RELEASE_TAG"
          bash scripts/check-google-cloud-rust.sh

  smoke-assets:
    name: Smoke ${{ matrix.platform }} release bytes
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux_amd64
            runner: ubuntu-24.04
            validation: load
          - platform: linux_arm64
            runner: ubuntu-24.04-arm
            validation: load
          - platform: osx_amd64
            runner: macos-15-intel
            validation: load
          - platform: osx_arm64
            runner: macos-15
            validation: load
          - platform: windows_amd64
            runner: windows-2025
            validation: load
          - platform: windows_amd64_mingw
            runner: windows-2025
            validation: metadata
    runs-on: ${{ matrix.runner }}
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out the immutable dispatch commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Download exact main-run artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          artifact-ids: ${{ fromJSON(needs.preflight.outputs.artifact_ids)[matrix.platform] }}
          path: release-candidate
          merge-multiple: true
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.source_run_id }}

      - name: Install DuckDB v1.5.5
        if: matrix.validation == 'load'
        shell: bash
        run: python -m pip install --disable-pip-version-check 'duckdb==1.5.5'

      - name: Load and exercise the exact release bytes
        if: matrix.validation == 'load'
        shell: bash
        run: python scripts/smoke-release-asset.py release-candidate/spanner.duckdb_extension

      - name: Validate MinGW metadata and static runtime imports
        if: matrix.validation == 'metadata'
        shell: bash
        env:
          EXPECTED_EXTENSION_TAG: ${{ inputs.release_tag }}
        run: python scripts/check-release-asset-metadata.py release-candidate/spanner.duckdb_extension

  stage-draft:
    name: Attach verified assets to draft release
    needs: [preflight, smoke-assets]
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
    steps:
      - name: Check out the immutable dispatch commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Download all verified artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          # Keep artifact-name directories because every artifact has the same filename.
          artifact-ids: ${{ needs.preflight.outputs.artifact_ids_csv }}
          path: release-assets
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.source_run_id }}

      - name: Package assets and generate checksums
        shell: bash
        run: |
          set -euo pipefail
          python scripts/package-release-assets.py \
            --duckdb-version "$DUCKDB_VERSION" release-assets staged-assets
          if [[ $(find staged-assets -type f -name '*.zip' | wc -l) -ne 6 ]]; then
            echo 'Expected exactly six staged extension archives.' >&2
            exit 1
          fi
          (cd staged-assets && sha256sum -- ./*.zip > SHA256SUMS)

      - name: Upload only to the still-draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          DISPATCH_SHA: ${{ github.sha }}
          EXPECTED_ARTIFACT_MANIFEST: ${{ needs.preflight.outputs.artifact_manifest }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          set -euo pipefail

          tag_ref=$(gh api "repos/$GH_REPO/git/ref/tags/$RELEASE_TAG")
          tag_object_type=$(jq -r '.object.type' <<<"$tag_ref")
          tag_object_sha=$(jq -r '.object.sha' <<<"$tag_ref")
          if [[ "$tag_object_type" != tag ]]; then
            echo "Release tag $RELEASE_TAG is no longer annotated." >&2
            exit 1
          fi
          tag_object=$(gh api "repos/$GH_REPO/git/tags/$tag_object_sha")
          tag_target_type=$(jq -r '.object.type' <<<"$tag_object")
          tag_sha=$(jq -r '.object.sha' <<<"$tag_object")
          source_sha=$(gh api "repos/$GH_REPO/actions/runs/$SOURCE_RUN_ID" \
            --jq '.head_sha')
          if [[ "$tag_target_type" != commit || "$tag_sha" != "$DISPATCH_SHA" ||
                "$source_sha" != "$DISPATCH_SHA" ]]; then
            echo 'Tag, dispatch commit, and source-run commit changed during staging.' >&2
            exit 1
          fi

          current_artifacts=$(gh api \
            "repos/$GH_REPO/actions/runs/$SOURCE_RUN_ID/artifacts?per_page=100")
          current_manifest=$(jq -c '
            [.artifacts[] | select(.expired == false) | {id, name, digest}] |
            sort_by(.name)
          ' <<<"$current_artifacts")
          if [[ "$current_manifest" != "$EXPECTED_ARTIFACT_MANIFEST" ]]; then
            echo 'Source artifact IDs or digests changed during staging.' >&2
            exit 1
          fi

          draft=$(gh release view "$RELEASE_TAG" --json isDraft --jq '.isDraft')
          if [[ "$draft" != true ]]; then
            echo "Release $RELEASE_TAG is no longer a draft; refusing asset upload." >&2
            exit 1
          fi
          asset_count=$(gh release view "$RELEASE_TAG" --json assets --jq '.assets | length')
          if [[ "$asset_count" != 0 ]]; then
            echo "Draft release $RELEASE_TAG now has $asset_count uploaded asset(s)." >&2
            exit 1
          fi
          gh release upload "$RELEASE_TAG" staged-assets/*
