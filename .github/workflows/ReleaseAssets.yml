# Build the supported extension distributions and attach them to a published release.
name: Publish Release Assets

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-preflight:
    name: Validate published release provenance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - name: Check out the published tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}
          fetch-depth: 1

      - name: Validate release metadata and CI integrity
        run: scripts/check-release-integrity.sh --release-tag "$RELEASE_TAG"

  build-distributions:
    name: Build extension distributions
    needs: release-preflight
    permissions:
      contents: read
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@e1fff3981c714851d54fd856237769ec6cbaa957 # e1fff3981c714851d54fd856237769ec6cbaa957
    with:
      duckdb_version: v1.5.4
      ci_tools_version: e1fff3981c714851d54fd856237769ec6cbaa957
      extension_name: spanner
      extra_toolchains: rust;python3
      # musl: not targeted; wasm: extension uses tokio+gRPC+rustls (not wasm-compatible).
      exclude_archs: 'linux_amd64_musl;wasm_mvp;wasm_eh;wasm_threads'
      # Release assets are a full distribution, rather than the reduced PR matrix.
      reduced_ci_mode: disabled
      run_disk_clean_step: true
      # macOS/windows runners lack a Spanner emulator; tests run in the main CI workflow.
      skip_tests: true

  upload-release-assets:
    name: Upload extension distributions
    needs: build-distributions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: spanner-v1.5.4-extension-*
          path: release-assets

      - name: Name assets by target platform
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          artifacts=(release-assets/*/spanner.duckdb_extension)
          if (( ${#artifacts[@]} == 0 )); then
            echo 'No extension distribution artifacts were downloaded.' >&2
            exit 1
          fi

          for artifact in "${artifacts[@]}"; do
            artifact_dir=${artifact%/*}
            artifact_name=${artifact_dir##*/}
            platform=${artifact_name#spanner-v1.5.4-extension-}
            if [[ "$platform" == "$artifact_name" ]]; then
              echo "Unexpected artifact directory: $artifact_name" >&2
              exit 1
            fi

            mv "$artifact" "release-assets/spanner-v1.5.4-${platform}.duckdb_extension"
          done

      - name: Upload assets to the published release
        shell: bash
        run: gh release upload "$RELEASE_TAG" release-assets/*.duckdb_extension --clobber
