#
# This workflow calls the main distribution pipeline from DuckDB to build, test and (optionally) release the extension
#
name: Main Extension Distribution Pipeline
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs for the same ref; on main, include SHA so each push gets its own group.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' || github.sha }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      run_distribution: ${{ steps.changed.outputs.run_distribution }}
      run_emulator: ${{ steps.changed.outputs.run_emulator }}
      reduced_ci_mode: ${{ steps.changed.outputs.reduced_ci_mode }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: changed
        name: Classify changed files
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
        run: |
          set -euo pipefail

          run_distribution=true
          run_emulator=true
          reduced_ci_mode=disabled

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            run_distribution=false
            run_emulator=false
            reduced_ci_mode=enabled

            git diff --name-only "$PR_BASE_SHA" HEAD > changed-files.txt
            echo "Changed files:"
            cat changed-files.txt

            while IFS= read -r path; do
              case "$path" in
                Cargo.toml|Cargo.lock|Makefile|.cargo/*|.github/workflows/*|extension-ci-tools|extension-ci-tools/*|src/*)
                  run_distribution=true
                  run_emulator=true
                  ;;
                test/*|tests/*)
                  run_emulator=true
                  ;;
              esac
            done < changed-files.txt
          fi

          {
            echo "run_distribution=$run_distribution"
            echo "run_emulator=$run_emulator"
            echo "reduced_ci_mode=$reduced_ci_mode"
          } >> "$GITHUB_OUTPUT"

  lint:
    name: Format and Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - run: cargo fmt --check
      - run: cargo clippy --features loadable-extension

  duckdb-stable-build:
    name: Build extension binaries
    needs: changes
    if: ${{ needs.changes.outputs.run_distribution == 'true' }}
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5-variegata
    with:
      duckdb_version: v1.5.4
      ci_tools_version: v1.5-variegata
      extension_name: spanner
      extra_toolchains: rust;python3
      reduced_ci_mode: ${{ needs.changes.outputs.reduced_ci_mode }}
      run_disk_clean_step: ${{ github.event_name != 'pull_request' }}
      # musl: not targeted; wasm: extension uses tokio+gRPC+rustls (not wasm-compatible).
      exclude_archs: 'linux_amd64_musl;wasm_mvp;wasm_eh;wasm_threads'
      # macOS/windows runners lack a Spanner emulator; tests run in emulator-tests below.
      skip_tests: true

  sqllogictest:
    name: SQLLogicTest
    needs: changes
    if: ${{ needs.changes.outputs.run_emulator == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: SQLLogicTest (make test_release)
        run: make configure release test_release

  rust-integration-tests:
    name: Rust integration tests
    needs: changes
    if: ${{ needs.changes.outputs.run_emulator == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Rust integration tests
        run: cargo test
